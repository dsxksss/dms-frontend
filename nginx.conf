server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # API 反代到后端（同源，无 CORS）。后端须在同网络以服务名 `backend` 暴露 8080。
    # 透传 X-Forwarded-For 供后端审计记录真实 IP。
    location /v1/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /healthz { proxy_pass http://backend:8080; }
    location = /readyz  { proxy_pass http://backend:8080; }
    location = /metrics { proxy_pass http://backend:8080; }

    # 带 hash 的静态资源长缓存。
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 路由回退。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
